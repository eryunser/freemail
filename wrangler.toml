name = "freemail"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "temp-mail-db" #你的d1数据库名称
database_id = "98178168-85b8-4829-a804-7bba568c8ffa" # 你的database_id

# 环境变量
[vars]
MAIL_DOMAIN = "eryuns.pp.ua" #可以多个 以英文逗号分隔
ADMIN_NAME = "eryuns" # 超级管理员用户名 （不配名称 默认为admin）
ADMIN_PASSWORD = "Hujunhao.110" # 超级管理员密码
JWT_TOKEN = "PrssWard#123" # 随便一串字符串
RESEND_API_KEY = re_hCApiPSz_FNAn6UaUX4nQ8NxHMjuTmQ4v

# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"

# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true
